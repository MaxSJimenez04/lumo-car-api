$kind: http-example
name: forgot-password verify :usuario_200
description: Verify the recovery code sent by email. No Auth (public).
request:
  url: "{{baseUrl}}/auth/forgot-password/verify/:usuario"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    usuario: josue12
  body:
    type: json
    content: |-
      {
        "codigo": "477172"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    x-powered-by: Express
    access-control-allow-origin: http://localhost:5173
    vary: Origin
    content-type: application/json; charset=utf-8
    content-length: "29"
    etag: W/"1d-eU6gu0fcI40IFR3CUo7sAqywe8I"
    date: Thu, 18 Jun 2026 04:20:01 GMT
    connection: keep-alive
    keep-alive: timeout=5
  body:
    type: json
    content: |-
      {
        "mensaje": "Código válido"
      }
order: 513836745299
