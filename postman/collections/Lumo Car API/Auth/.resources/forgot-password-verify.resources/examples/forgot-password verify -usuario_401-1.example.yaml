$kind: http-example
name: forgot-password verify :usuario_401
description: Verify the recovery code sent by email. No Auth (public).
request:
  url: "{{baseUrl}}/auth/forgot-password/verify/:usuario"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    usuario: Sadministrador001
  body:
    type: json
    content: |-
      {
        "codigo": "1781750662"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    x-powered-by: Express
    access-control-allow-origin: http://localhost:5173
    vary: Origin
    content-type: application/json; charset=utf-8
    content-length: "31"
    etag: W/"1f-F4k5C0u1RhTarrlx6oq2sRQ/hTk"
    date: Thu, 18 Jun 2026 02:47:03 GMT
    connection: keep-alive
    keep-alive: timeout=5
  body:
    type: json
    content: |-
      {
        "mensaje": "Código inválido"
      }
order: 3584419246453496
