$kind: http-example
name: forgot-password :usuario_200
description: Send a password recovery code by email. No Auth (public). No body.
request:
  url: "{{baseUrl}}/auth/forgot-password/:usuario"
  method: POST
  pathVariables:
    usuario: josue15
response:
  statusCode: 200
  statusText: OK
  headers:
    x-powered-by: Express
    access-control-allow-origin: http://localhost:5173
    vary: Origin
    content-type: application/json; charset=utf-8
    content-length: "76"
    etag: W/"4c-KMGbsUJekw6jmXsPuyUtlubm6io"
    date: Thu, 18 Jun 2026 04:17:44 GMT
    connection: keep-alive
    keep-alive: timeout=5
  body:
    type: json
    content: |-
      {
        "mensaje": "Código enviado al correo: josue@gmail.com",
        "usuario": "Josue15"
      }
order: 4262263800345721
