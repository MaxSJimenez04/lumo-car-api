$kind: http-example
name: forgot-password :usuario_200
description: Send a password recovery code by email. No Auth (public). No body.
request:
  url: "{{baseUrl}}/auth/forgot-password/:usuario"
  method: POST
  pathVariables:
    usuario: Sadministrador001
response:
  statusCode: 200
  statusText: OK
  headers:
    x-powered-by: Express
    access-control-allow-origin: http://localhost:5173
    vary: Origin
    content-type: application/json; charset=utf-8
    content-length: "98"
    etag: W/"62-TchpYeM7ta/8420ZSo7wQjU+Q6k"
    date: Thu, 18 Jun 2026 02:44:23 GMT
    connection: keep-alive
    keep-alive: timeout=5
  body:
    type: json
    content: |-
      {
        "mensaje": "Código enviado al correo: administrador01@lumocar.com",
        "usuario": "Sadministrador001"
      }
order: 1781750667628
