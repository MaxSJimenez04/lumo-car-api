$kind: http-request
name: forgot-password verify :usuario
description: Verify the recovery code sent by email. No Auth (public).
method: POST
url: "{{baseUrl}}/auth/forgot-password/verify/:usuario"
examples: .resources/forgot-password-verify.resources/examples
order: 4000
auth:
  type: noauth
headers:
  Content-Type: application/json
pathVariables:
  usuario: Sadministrador001
body:
  type: json
  content: |-
    {
      "codigo": "1781750662"
    }
