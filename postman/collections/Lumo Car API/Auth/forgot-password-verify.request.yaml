$kind: http-request
name: 'forgot-password verify :usuario'
description: 'Verify the recovery code sent by email. No Auth (public).'
method: POST
url: '{{baseUrl}}/auth/forgot-password/verify/:usuario'
order: 4000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: usuario
    value: johndoe
body:
  type: json
  content: |-
    {
      "codigo": "123456"
    }
