$kind: http-request
name: login
description: Authenticate a user and receive a JWT. No Auth (public).
method: POST
url: "{{baseUrl}}/auth/login"
examples: .resources/login.resources/examples
order: 1000
auth:
  type: noauth
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "usuario": "BrendaMarquez",
      "contrasena": "password1234"
    }
