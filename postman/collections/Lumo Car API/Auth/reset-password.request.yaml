$kind: http-request
name: reset-password :usuario
description: Reset the password (min 8 chars) after verifying the recovery code. No Auth (public).
method: POST
url: "{{baseUrl}}/auth/reset-password/:usuario"
examples: .resources/reset-password.resources/examples
order: 5000
auth:
  type: noauth
headers:
  Content-Type: application/json
pathVariables:
  usuario: josue12
body:
  type: json
  content: |-
    {
      "contrasena": "@contrasena2"
    }
