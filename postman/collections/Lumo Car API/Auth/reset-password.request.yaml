$kind: http-request
name: 'reset-password :usuario'
description: 'Reset the password (min 8 chars) after verifying the recovery code. No Auth (public).'
method: POST
url: '{{baseUrl}}/auth/reset-password/:usuario'
order: 5000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: usuario
    value: johndoe
body:
  type: json
  content: |-
    {
      "contrasena": "<nuevaContrasena>"
    }
