url: "{{baseUrl}}/sucursales/ciudad"
examples: .resources/crear-ciudad.resources/examples
order: 4000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "nombreCiudad": "Orizaba",
      "idEstado": 30
    }
