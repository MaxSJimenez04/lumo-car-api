$kind: http-request
name: metodo-pago
description: 'Update the subscription payment method. Bearer auth required (role: Cliente).'
method: PUT
url: '{{baseUrl}}/suscripciones/metodo-pago'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "numeroTarjeta": "4111111111111111",
      "titular": "John Doe",
      "fechaExpiracion": "12/28",
      "cvv": "123"
    }
