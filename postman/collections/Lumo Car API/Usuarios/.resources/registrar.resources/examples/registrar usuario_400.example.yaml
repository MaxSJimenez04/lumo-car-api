$kind: http-example
description: Public user registration. No Auth.
request:
  url: "{{baseUrl}}/usuarios/"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "usuario": "josue",
        "contrasena": "@",
        "correo": "josue@example.com",
        "nombre": "Josue",
        "apellidos": "MG",
        "telefono": "+525551234567",
        "fecha": {
          "ano": 2001,
          "mes": 5,
          "dia": 12
        },
        "idRol": 3
      }
