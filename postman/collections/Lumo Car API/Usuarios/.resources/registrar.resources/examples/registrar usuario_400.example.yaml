    etag: W/"10b-V1KtM1Np8lAsbd94ILIxVRTbqa8"
    date: Thu, 18 Jun 2026 01:43:51 GMT
    connection: keep-alive
    keep-alive: timeout=5
  body:
    type: json
    content: |-
      [
        {
          "type": "field",
          "value": "@",
          "msg": "Contraseña debe ser de 8 caracteres hasta 255",
