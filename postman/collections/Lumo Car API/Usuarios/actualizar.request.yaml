$kind: http-request
name: actualizar usuario :usuario
description: Update a user profile. Bearer auth required.
method: PUT
url: "{{baseUrl}}/usuarios/:usuario"
examples: .resources/actualizar.resources/examples
order: 4000
headers:
  Content-Type: application/json
pathVariables:
  usuario: josue
body:
  type: json
  content: |-
    {
      "nombre": "Josue",
      "apellidos": "Melgarejo",
      "correo": "josue@example.com",
      "telefono": "5551234567"
    }
