$kind: http-request
name: 'actualizar vehiculo :id'
description: 'Update a vehicle. Bearer auth required.'
method: PUT
url: '{{baseUrl}}/vehiculos/:id'
order: 7000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '1'
body:
  type: json
  content: |-
    {
      "pasajeros": 5,
      "aire_acondicionado": true,
      "idColor": 1,
      "idSucursal": 1
    }
