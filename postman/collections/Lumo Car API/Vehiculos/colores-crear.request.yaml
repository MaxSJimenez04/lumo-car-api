$kind: http-request
name: crear color
description: 'Create a color. Bearer auth required.'
method: POST
url: '{{baseUrl}}/vehiculos/colores'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "color": "Rojo",
      "codigoHex": "#FF0000"
    }
