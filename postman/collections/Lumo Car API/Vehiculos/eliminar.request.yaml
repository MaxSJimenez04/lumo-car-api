$kind: http-request
name: eliminar vehiculo
description: Delete a vehicle by UUID. Bearer auth required.
method: DELETE
url: "{{baseUrl}}/vehiculos/"
examples: .resources/eliminar.resources/examples
order: 5000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "id": "<uuid vehiculo>"
    }
