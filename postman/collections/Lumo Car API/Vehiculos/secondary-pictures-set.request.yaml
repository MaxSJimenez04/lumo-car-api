$kind: http-request
name: 'asignar fotos-secundarias :id'
description: 'Set the vehicle secondary pictures. Bearer auth required (roles: Administrador, S_Administrador).'
method: PUT
url: '{{baseUrl}}/vehiculos/:id/fotos-secundarias'
order: 13000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '1'
body:
  type: json
  content: |-
    {
      "idsArchivos": [1, 2, 3]
    }
